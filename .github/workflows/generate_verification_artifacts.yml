name: Generate TSF Artifacts (Ceedling + CodeQL)

on:
  workflow_call:
    inputs:
      build_dir:
        type: string
        default: "build"

jobs:
  verification:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Test Dependencies (Ceedling stack)
        run: |
          sudo apt-get update && sudo apt-get install -y ruby ruby-dev build-essential cmake
          sudo gem install ceedling
          pip install gcovr

      # 1. Initialize CodeQL (Replaces Cppcheck)
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: cpp
          queries: security-and-quality
      
      # 2. Build & Run Tests (Captures compilation for CodeQL)
      - name: Run Unit Tests & Build
        run: |
          # This script now generates JUnit and Cobertura XMLs
          bash tests/unit/run_all_tests.sh

      # 3. Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:cpp"
          output: codeql-results

      # 4. Move CodeQL SARIF to TSF Artifacts
      - name: Prepare SARIF for TSF
        run: |
          mkdir -p artifacts/verification/static-analysis
          # Copy the SARIF generated by the analyze step
          cp codeql-results/cpp.sarif artifacts/verification/static-analysis/codeql.sarif

      # 5. Upload All Evidence
      - name: Upload TSF Evidence
        uses: actions/upload-artifact@v6
        with:
          name: verification-artifacts
          path: artifacts/verification
          retention-days: 30
